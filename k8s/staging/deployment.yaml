# Storybook static site for @uniicy/ui-beyond
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui-beyond-storybook
  namespace: ui-beyond
  labels:
    app.kubernetes.io/name: ui-beyond-storybook
    app.kubernetes.io/part-of: ui-beyond
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ui-beyond-storybook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ui-beyond-storybook
        app.kubernetes.io/part-of: ui-beyond
    spec:
      containers:
        - name: ui-beyond-storybook
          image: 157.180.12.54:5000/ui-beyond:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
