# Deploy Storybook to staging (storybook.staging.uniicy.com)
# Runs on Uniicy ARC self-hosted runners + k3s cluster.

name: Deploy Storybook to Staging

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.storybook/**'
      - 'package.json'
      - 'bun.lock'
      - 'Dockerfile'
      - 'nginx.conf'
      - 'k8s/staging/**'
      - '.github/workflows/deploy-staging.yaml'
  workflow_dispatch:

env:
  REGISTRY: 157.180.12.54:5000
  IMAGE_NAME: ui-beyond
  NAMESPACE: ui-beyond
  DEPLOYMENT: ui-beyond-storybook

jobs:
  build-and-deploy:
    runs-on: arc-runner-set
    timeout-minutes: 20
    concurrency:
      group: deploy-staging-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=${REGISTRY}/${IMAGE_NAME}:sha-${SHA}" >> "$GITHUB_OUTPUT"
          echo "tag_latest=${REGISTRY}/${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.tag_latest }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/cache/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/cache/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Apply manifests (idempotent)
        run: |
          kubectl apply -f k8s/staging/namespace.yaml
          kubectl apply -f k8s/staging/basic-auth-secret.yaml -n ${NAMESPACE}
          kubectl apply -f k8s/staging/service.yaml -n ${NAMESPACE}
          kubectl apply -f k8s/staging/ingress.yaml -n ${NAMESPACE}
          kubectl apply -f k8s/staging/deployment.yaml -n ${NAMESPACE}

      - name: Update deployment image
        run: |
          kubectl set image deployment/${DEPLOYMENT} \
            ${DEPLOYMENT}=${{ steps.meta.outputs.tag }} \
            -n ${NAMESPACE}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/${DEPLOYMENT} \
            -n ${NAMESPACE} --timeout=180s

      - name: Verify
        run: |
          kubectl get pods -n ${NAMESPACE} -l app.kubernetes.io/name=${DEPLOYMENT}
          kubectl get ingress -n ${NAMESPACE} ${DEPLOYMENT}
